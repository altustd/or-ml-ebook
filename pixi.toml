[workspace]
authors = ["Troy Altus <altustd@gmail.com>"]
channels = ["conda-forge"]
name = "ops-research"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
setup   = "python -m ipykernel install --user --name orml --display-name 'Python (orml)'"
render  = "JUPYTER_DATA_DIR=$PIXI_PROJECT_ROOT/.kernels quarto render"
preview = "JUPYTER_DATA_DIR=$PIXI_PROJECT_ROOT/.kernels quarto preview"

[dependencies]
python      = ">=3.12,<3.13"
numpy       = ">=2.4,<3"
scipy       = ">=1.17,<2"
matplotlib  = ">=3.10,<4"
plotly      = ">=6,<7"
scikit-learn = ">=1.8,<2"
pulp        = ">=3.3,<4"
networkx    = ">=3.6,<4"
ipykernel   = ">=6,<7"
notebook    = ">=7,<8"
pyyaml      = ">=6,<7"
jupyter     = ">=1,<2"
