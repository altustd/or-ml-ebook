project:
  type: book
  output-dir: docs

book:
  title: "Modern Operations Research with Python"
  subtitle: "Combining Optimization, Machine Learning, and Simulation"
  author: "Troy Altus"
  date: "May 2026"
  search: true
  downloads: [pdf]

  chapters:
    - index.qmd
    - part: "Part I: Mathematical Foundations"
      chapters:
        - chapters/01-foundations-linear-algebra.qmd
        - chapters/02-foundations-probability-statistics.qmd
        - chapters/03-foundations-modeling.qmd
    - part: "Part II: Classical Optimization"
      chapters:
        - chapters/04-introduction-to-or-ml.qmd
        - chapters/05-linear-programming.qmd
        - chapters/06-integer-programming.qmd
        - chapters/07-network-optimization.qmd
    - part: "Part III: Uncertainty and Data-Driven Optimization"
      chapters:
        - chapters/08-stochastic-programming.qmd
        - chapters/09-robust-optimization.qmd
        - chapters/10-simulation-monte-carlo.qmd
    - part: "Part IV: Machine Learning Meets Optimization"
      chapters:
        - chapters/11-predict-then-optimize.qmd
        - chapters/12-reinforcement-learning-dp.qmd
        - chapters/13-learning-augmented-optimization.qmd
    - part: "Part V: Applications"
      chapters:
        - chapters/14-supply-chain-optimization.qmd
        - chapters/15-resource-scheduling.qmd
        - chapters/16-capstone-pipeline.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    code-fold: show
    code-tools: true
    toc: true
    toc-depth: 3
    number-sections: true
    highlight-style: github
    fig-width: 8
    fig-height: 5
    fig-align: center
    html-math-method: mathjax
  pdf:
    documentclass: book
    classoption: [letterpaper, 11pt]
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1in
    number-sections: true
    colorlinks: true
    toc: true
    toc-depth: 3
    fig-pos: "H"
    keep-tex: false

jupyter: orml

execute:
  echo: true
  warning: false
  message: false
  cache: false